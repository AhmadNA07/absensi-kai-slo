    <style>
        * {

            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #F5F7FB;

        }

        /* Navbar */
        .navbar {
            background: #FFFFFF;

            display: flex;
            justify-content: space-between;

        /* Main Content */
        .main-content {

        /* Menu Cards */
        .menu-cards {

        .menu-card {
            flex: 1;

        }

        .menu-card h3 {

        }

        .menu-card p {
            font-size: 0.7rem;

        }

        /* Camera Wrapper */
        .camera-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 20px;
            overflow: hidden;
        }

        .camera-wrapper.face-detected #faceVideo {
            border: 4px solid #2E7D32;
            box-shadow: 0 0 0 2px rgba(46,125,50,0.3);
        }

        .camera-wrapper.face-not-detected #faceVideo {
            border: 4px solid #C62828;
            box-shadow: 0 0 0 2px rgba(198,40,40,0.3);
        }

        #faceVideo, #photoVideo {
            width: 100%;
            max-width: 340px;
            border-radius: 20px;
            background: #1a1a2e;

            object-fit: cover;
            transition: all 0.2s ease;

        .face-status {

            margin-top: 12px;

        .face-status.success {

        }

        .face-status.error {

            color: #721C24;

            font-size: 0.95rem;

        .btn-primary:hover {
            background: #1B5E20;
        }

            background: #CBD5E1;
            cursor: not-allowed;
        }

            background: #1E3A5F;

            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            width: 100%;

            margin-top: 8px;

            background: #2C5282;
        }

        /* Section Title */

            font-size: 1rem;
            font-weight: 600;
            color: #1E3A5F;
            margin: 20px 0 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #E2E8F0;
        }

        /* Absen List */
        .absen-list {
            background: white;
            border-radius: 16px;
            border: 1px solid #E9EDF2;

        }

        .absen-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #E9EDF2;

        .empty-list {

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            overflow-y: auto;

        .modal-content {
            background: white;
            margin: 5% auto;
            width: 90%;
            max-width: 460px;
            border-radius: 24px;
            padding: 24px 20px 28px;
            position: relative;
            animation: modalFadeIn 0.25s ease;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.25);
        }

        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #94A3B8;
            transition: color 0.2s;
        }

        .close:hover {
            color: #1E293B;
        }

        /* Admin Login Modal */
        .admin-login-section {
            text-align: center;
        }

        .admin-login-section input {

            padding: 12px 16px;
            border: 1px solid #E2E8F0;

            font-size: 1rem;

        .shift-options {
            display: flex;

        }

        .shift-option {
            background: #F8FAFE;

            border-radius: 20px;

            cursor: pointer;

        /* Photo Preview */
        .photo-preview {

        }

        .photo-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 16px;
            border: 2px solid #E2E8F0;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 480px) {
            .menu-cards {
                flex-direction: column;
                gap: 12px;
            }
            .menu-card {
                padding: 16px;
            }
            .menu-icon {
                font-size: 2rem;
            }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.15/dist/face-api.js"></script>
    <script>
        // ==================== KONFIGURASI ====================
        const SUPABASE_URL = 'https://oufcvucxxnfgimryjpbs.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91ZmN2dWN4eG5mZ2ltcnlqcGJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTg1NDMsImV4cCI6MjA5MDU5NDU0M30.Gmp3NiQlXTiTzdZFh9XGjjNh39i7TGNozQfSYu9nE38';
        const ADMIN_PASSWORD = 'admin2026';
        
        const SHIFT_CONFIG = {
            pagi: { start: '08:00', end: '14:00', nama: 'Pagi (08:00-14:00)', jamMulai: 8*60 },
            siang: { start: '12:00', end: '18:00', nama: 'Siang (12:00-18:00)', jamMulai: 12*60 },
            piket: { start: '08:00', end: '16:00', nama: 'Piket (08:00-16:00)', jamMulai: 8*60 }
        };

        // Lokasi Solo Balapan
        const SOLO_BALAPAN = {
            lat: -7.5592,
            lng: 110.8220,
            radius: 500
        };

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let faceModelsLoaded = false;
        let videoStream = null;
        let photoStream = null;
        let faceDetectionInterval = null;
        let isVerifying = false;
        let currentMatchedStudent = null;
        let currentSelectedShift = null;
        let capturedPhoto = null;
        
        const FACE_MATCH_THRESHOLD = 0.4;

        // ==================== FUNGSI LOGOUT & AUTH ====================
        function logout() {
            sessionStorage.clear();
            window.location.replace('index.html');
        }

        function checkAuth() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            if (!isLoggedIn) {
                window.location.replace('index.html');
                return false;
            }
            return true;
        }

        function preventBackNavigation() {
            history.pushState(null, null, location.href);
            window.onpopstate = function() {
                history.go(1);
                if (!sessionStorage.getItem('isLoggedIn')) {
                    window.location.replace('index.html');
                }
            };
        }

        window.addEventListener('pageshow', function(event) {
            if (event.persisted) {
                checkAuth();
            }
        });

        // ==================== WIB TIME (MANUAL OFFSET +7) ====================
        function getWIBTime() {
            const now = new Date();
            now.setHours(now.getHours() + 7);
            return now;
        }

        function getTodayWIB() {
            const now = new Date();
            now.setHours(now.getHours() + 7);
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatWIBTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            date.setHours(date.getHours() + 7);
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        // ==================== FACE RECOGNITION CORE ====================
        async function loadFaceModels() {
            if (faceModelsLoaded) return true;
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                faceModelsLoaded = true;
                return true;
            } catch (error) {
                console.error(error);
                return false;
            }
        }

        async function startCamera(videoElement) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                videoElement.srcObject = stream;
                return stream;
            } catch (error) {
                return null;
            }
        }

        function stopCamera(stream, videoElement) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (videoElement) videoElement.srcObject = null;
        }

        async function getFaceDescriptor(videoElement) {
            const detection = await faceapi
                .detectSingleFace(videoElement, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks()
                .withFaceDescriptor();
            return detection ? detection.descriptor : null;
        }

        async function matchFace(descriptor) {
            const { data: siswa, error } = await supabaseClient
                .from('siswa')
                .select('id, nis, nama, face_descriptor, sekolah:sekolah_id(nama)')
                .eq('has_face', true)
                .eq('status', 'aktif');
            
            if (error || !siswa || siswa.length === 0) return null;
            
            let bestMatch = null;
            let minDistance = FACE_MATCH_THRESHOLD;
            
            for (const s of siswa) {
                if (!s.face_descriptor) continue;
                const dbDescriptor = new Float32Array(Object.values(s.face_descriptor));
                const distance = faceapi.euclideanDistance(descriptor, dbDescriptor);
                if (distance < minDistance) {
                    minDistance = distance;
                    bestMatch = s;
                }
            }
            return bestMatch;
        }

        // ==================== CEK LOKASI ====================
        async function checkLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject('Geolocation tidak didukung');
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const distance = haversineDistance(
                            position.coords.latitude, position.coords.longitude,
                            SOLO_BALAPAN.lat, SOLO_BALAPAN.lng
                        );
                        resolve({ allowed: distance <= SOLO_BALAPAN.radius, distance: distance });
                    },
                    (error) => {
                        let message = 'Gagal dapat lokasi';
                        if (error.code === 1) message = 'Izin lokasi ditolak';
                        else if (error.code === 2) message = 'Lokasi tidak tersedia';
                        else if (error.code === 3) message = 'Timeout mendapatkan lokasi';
                        reject(message);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        // ==================== STEP 1: DETEKSI WAJAH ====================
        async function startFaceDetection(video, cameraWrapper, faceStatus) {
            if (faceDetectionInterval) clearInterval(faceDetectionInterval);
            
            faceDetectionInterval = setInterval(async () => {
                if (!video.videoWidth || !video.videoHeight) return;
                
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions());
                
                if (detection) {
                    cameraWrapper.classList.remove('face-not-detected');
                    cameraWrapper.classList.add('face-detected');
                    faceStatus.innerHTML = '✅ Wajah terdeteksi! Memverifikasi...';
                    
                    if (!isVerifying) {
                        isVerifying = true;
                        await verifyFace(video, faceStatus);
                    }
                } else {
                    cameraWrapper.classList.remove('face-detected');
                    cameraWrapper.classList.add('face-not-detected');
                    faceStatus.innerHTML = '❌ Wajah tidak terdeteksi';
                    isVerifying = false;
                }
            }, 500);
        }

        async function verifyFace(video, faceStatus) {
            let descriptors = [];
            for (let i = 0; i < 3; i++) {
                await new Promise(r => setTimeout(r, 200));
                const desc = await getFaceDescriptor(video);
                if (desc) descriptors.push(desc);
            }
            
            if (descriptors.length === 0) {
                faceStatus.innerHTML = '❌ Wajah tidak terdeteksi, coba lagi';
                isVerifying = false;
                return;
            }
            
            const avgDescriptor = new Float32Array(descriptors[0].length);
            for (const desc of descriptors) {
                for (let i = 0; i < desc.length; i++) {
                    avgDescriptor[i] += desc[i];
                }
            }
            for (let i = 0; i < avgDescriptor.length; i++) {
                avgDescriptor[i] /= descriptors.length;
            }
            
            faceStatus.innerHTML = '🔍 Mencocokkan wajah dengan database...';
            
            const matchedUser = await matchFace(avgDescriptor);
            
            if (matchedUser) {
                // Cek sudah absen hari ini
                const today = getTodayWIB();
                const { data: existingAbsen } = await supabaseClient
                    .from('absensi')
                    .select('id')
                    .eq('siswa_id', matchedUser.id)
                    .gte('tanggal', today)
                    .lte('tanggal', today + ' 23:59:59');
                
                if (existingAbsen && existingAbsen.length > 0) {
                    faceStatus.className = 'face-status warning';
                    faceStatus.innerHTML = `⚠️ ${matchedUser.nama} sudah melakukan absen hari ini!`;
                    isVerifying = false;
                    setTimeout(() => {
                        document.getElementById('absenModal').style.display = 'none';
                        stopFaceDetection();
                        stopCamera(videoStream, video);
                    }, 2000);
                    return;
                }
                
                currentMatchedStudent = matchedUser;
                
                stopFaceDetection();
                stopCamera(videoStream, video);
                showPhotoStep();
                
                isVerifying = false;
            } else {
                faceStatus.className = 'face-status error';
                faceStatus.innerHTML = '❌ Wajah tidak dikenali. Silakan coba lagi.';
                isVerifying = false;
            }
        }

        function stopFaceDetection() {
            if (faceDetectionInterval) {
                clearInterval(faceDetectionInterval);
                faceDetectionInterval = null;
            }
            isVerifying = false;
        }

        // ==================== STEP 2: AMBIL FOTO ====================
        async function showPhotoStep() {
            document.getElementById('stepDetection').style.display = 'none';
            document.getElementById('stepPhoto').style.display = 'block';
            document.getElementById('modalTitle').innerHTML = '📸 Ambil Foto Selfie';
            
            const video = document.getElementById('photoVideo');
            photoStream = await startCamera(video);
            
            document.getElementById('matchedStudentInfo').innerHTML = `
                <h4>👤 ${currentMatchedStudent.nama}</h4>
                <p>NIS: ${currentMatchedStudent.nis}</p>
                <p>Sekolah: ${currentMatchedStudent.sekolah?.nama || '-'}</p>
            `;
            document.getElementById('matchedStudentInfo').style.display = 'block';
        }

        function takePhoto() {
            const video = document.getElementById('photoVideo');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            capturedPhoto = canvas.toDataURL('image/jpeg', 0.8);
            
            document.getElementById('previewImg').src = capturedPhoto;
            document.getElementById('photoPreview').style.display = 'block';
            document.getElementById('takePhotoBtn').style.display = 'none';
            document.getElementById('shiftSection').style.display = 'block';
        }

        function retakePhoto() {
            capturedPhoto = null;
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('takePhotoBtn').style.display = 'block';
            document.getElementById('shiftSection').style.display = 'none';
        }

        // ==================== LOAD ABSEN LIST ====================
        async function loadAbsenList() {
            const container = document.getElementById('absenList');
            const today = getTodayWIB();
            
            console.log('Loading absen list for date:', today);
            
            try {
                const { data: absensi, error } = await supabaseClient
                    .from('absensi')
                    .select(`
                        *,
                        siswa:siswa_id (
                            nama,
                            nis
                        )
                    `)
                    .gte('tanggal', `${today} 00:00:00`)
                    .lte('tanggal', `${today} 23:59:59`)
                    .order('tanggal', { ascending: false });
                
                console.log('Absensi data:', absensi);
                console.log('Error:', error);
                
                if (error) {
                    console.error('Error loading absensi:', error);
                    container.innerHTML = '<div class="empty-list">❌ Gagal memuat data</div>';
                    return;
                }
                
                if (!absensi || absensi.length === 0) {
                    container.innerHTML = '<div class="empty-list">✨ Belum ada yang absen hari ini</div>';
                    return;
                }
                
                container.innerHTML = absensi.map(a => {
                    const siswaNama = a.siswa?.nama || 'Unknown';
                    const siswaNis = a.siswa?.nis || '-';
                    const waktu = formatWIBTime(a.tanggal);
                    return `
                        <div class="absen-item">
                            <div class="absen-item-info">
                                <h4>${siswaNama}</h4>
                                <p>NIS: ${siswaNis}</p>
                            </div>
                            <div class="absen-item-time">${waktu}</div>
                        </div>
                    `;
                }).join('');
                
            } catch (err) {
                console.error('Error in loadAbsenList:', err);
                container.innerHTML = '<div class="empty-list">❌ Error memuat data</div>';
            }
        }

        // ==================== DO ABSEN ====================
        async function doAbsen() {
            if (!currentMatchedStudent || !currentSelectedShift) {
                alert('Pilih shift terlebih dahulu!');
                return;
            }
            
            if (!capturedPhoto) {
                alert('Ambil foto selfie terlebih dahulu!');
                return;
            }
            
            const confirmBtn = document.getElementById('confirmAbsenBtn');
            confirmBtn.disabled = true;
            confirmBtn.textContent = 'Memproses...';
            
            try {
                const locationCheck = await checkLocation();
                if (!locationCheck.allowed) {
                    alert(`❌ Absen gagal! Anda tidak berada di area Solo Balapan. Jarak Anda ${Math.round(locationCheck.distance)} meter.`);
                    confirmBtn.disabled = false;
                    confirmBtn.textContent = '✅ Konfirmasi Absen';
                    return;
                }
            } catch (err) {
                alert(`❌ Gagal cek lokasi: ${err}`);
                confirmBtn.disabled = false;
                confirmBtn.textContent = '✅ Konfirmasi Absen';
                return;
            }
            
            const now = getWIBTime();
            const jamMulai = SHIFT_CONFIG[currentSelectedShift].jamMulai;
            const jamAbsenValue = now.getHours() * 60 + now.getMinutes();
            const isTerlambat = jamAbsenValue > jamMulai + 15;
            const keterlambatan = isTerlambat ? `Terlambat ${jamAbsenValue - jamMulai} menit` : 'Tepat waktu';
            const status = isTerlambat ? 'terlambat' : 'hadir';
            
            // Cek sekali lagi apakah sudah absen hari ini
            const today = getTodayWIB();
            const { data: existingAbsen } = await supabaseClient
                .from('absensi')
                .select('id')
                .eq('siswa_id', currentMatchedStudent.id)
                .gte('tanggal', `${today} 00:00:00`)
                .lte('tanggal', `${today} 23:59:59`);
            
            if (existingAbsen && existingAbsen.length > 0) {
                alert('Anda sudah melakukan absen hari ini!');
                document.getElementById('absenModal').style.display = 'none';
                stopCamera(photoStream, document.getElementById('photoVideo'));
                resetModal();
                return;
            }
            
            const utcTime = new Date(now);
            utcTime.setHours(utcTime.getHours() - 7);
            const isoString = utcTime.toISOString();
            
            let ip = 'Tidak terdeteksi';
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                ip = ipData.ip;
            } catch (err) {}
            
            const absenData = {
                siswa_id: currentMatchedStudent.id,
                shift: currentSelectedShift,
                tanggal: isoString,
                status: status,
                keterlambatan: keterlambatan,
                foto: capturedPhoto,
                lokasi: `Solo Balapan (${SOLO_BALAPAN.lat}, ${SOLO_BALAPAN.lng})`,
                ip_address: ip
            };
            
            const { error } = await supabaseClient.from('absensi').insert([absenData]);
            
            if (error) {
                alert('Error: ' + error.message);
                confirmBtn.disabled = false;
                confirmBtn.textContent = '✅ Konfirmasi Absen';
            } else {
                alert(`✅ Absen berhasil! ${status === 'hadir' ? 'Selamat datang!' : keterlambatan}`);
                document.getElementById('absenModal').style.display = 'none';
                stopCamera(photoStream, document.getElementById('photoVideo'));
                resetModal();
                await loadAbsenList(); // Refresh list
            }
        }

        function resetModal() {
            currentMatchedStudent = null;
            currentSelectedShift = null;
            capturedPhoto = null;
            document.getElementById('stepDetection').style.display = 'block';
            document.getElementById('stepPhoto').style.display = 'none';
            document.getElementById('matchedStudentInfo').style.display = 'none';
            document.getElementById('shiftSection').style.display = 'none';
            document.getElementById('confirmAbsenBtn').style.display = 'none';
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('takePhotoBtn').style.display = 'block';
            document.getElementById('modalTitle').innerHTML = '📸 Face Recognition';
            document.getElementById('faceStatus').className = 'face-status info';
            document.getElementById('faceStatus').innerHTML = '🔄 Memuat kamera...';
            document.getElementById('faceCameraWrapper').classList.remove('face-detected', 'face-not-detected');
        }

        // ==================== EVENT LISTENERS ====================
        document.addEventListener('DOMContentLoaded', async () => {
            // Cek autentikasi
            if (!checkAuth()) return;
            
            // Cegah back navigation
            preventBackNavigation();
            
            await loadAbsenList();
            
            // Logout button
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.onclick = logout;
            }
            
            // Absen Card
            document.getElementById('absenCard').onclick = async () => {
                const modal = document.getElementById('absenModal');
                const video = document.getElementById('faceVideo');
                const cameraWrapper = document.getElementById('faceCameraWrapper');
                const faceStatus = document.getElementById('faceStatus');
                
                modal.style.display = 'block';
                resetModal();
                
                faceStatus.innerHTML = '🔄 Memuat model...';
                const modelsLoaded = await loadFaceModels();
                if (!modelsLoaded) {
                    faceStatus.innerHTML = '❌ Gagal load model';
                    return;
                }
                
                faceStatus.innerHTML = '📷 Mengaktifkan kamera...';
                videoStream = await startCamera(video);
                if (!videoStream) {
                    faceStatus.innerHTML = '❌ Gagal akses kamera';
                    return;
                }
                
                faceStatus.innerHTML = '😀 Hadapkan wajah ke kamera';
                startFaceDetection(video, cameraWrapper, faceStatus);
            };
            
            // Admin Card
            document.getElementById('adminCard').onclick = () => {
                document.getElementById('adminModal').style.display = 'block';
                document.getElementById('adminPasswordInput').value = '';
            };
            
            document.getElementById('adminPasswordLoginBtn').onclick = () => {
                const password = document.getElementById('adminPasswordInput').value;
                if (password !== ADMIN_PASSWORD) {
                    alert('Password admin salah!');
                    return;
                }
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userRole', 'admin');
                document.getElementById('adminModal').style.display = 'none';
                window.location.href = 'admin.html';
            };
            
            // Photo buttons
            document.getElementById('takePhotoBtn').onclick = takePhoto;
            document.getElementById('retakePhotoBtn').onclick = retakePhoto;
            
            // Shift options
            document.querySelectorAll('.shift-option').forEach(btn => {
                btn.onclick = () => {
                    currentSelectedShift = btn.getAttribute('data-shift');
                    document.getElementById('confirmAbsenBtn').style.display = 'block';
                    document.querySelectorAll('.shift-option').forEach(b => {
                        b.style.border = '1px solid #E2E8F0';
                    });
                    btn.style.border = '2px solid #2E7D32';
                };
            });
            
            document.getElementById('confirmAbsenBtn').onclick = doAbsen;
            
            // Close modals
            document.querySelectorAll('.close').forEach(closeBtn => {
                closeBtn.onclick = () => {
                    const modal = closeBtn.closest('.modal');
                    if (modal) modal.style.display = 'none';
                    stopFaceDetection();
                    stopCamera(videoStream, document.getElementById('faceVideo'));
                    stopCamera(photoStream, document.getElementById('photoVideo'));
                    resetModal();
                };
            });
            
            window.onclick = (event) => {
                if (event.target.classList.contains('modal')) {
                    event.target.style.display = 'none';
                    stopFaceDetection();
                    stopCamera(videoStream, document.getElementById('faceVideo'));
                    stopCamera(photoStream, document.getElementById('photoVideo'));
                    resetModal();
                }
            };
        });
    </script>
</body>
</html>
