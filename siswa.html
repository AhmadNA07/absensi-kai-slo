        /* Main Content */

        /* Page Container */
        .page-container {
            display: none;

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }

        /* Camera Wrapper */
        .camera-wrapper {
            position: relative;

        }

        .camera-wrapper.face-detected #faceVideo {

        /* Responsive */

            .bottom-nav { display: none; }
            body { padding-bottom: 0; }

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==================== KONFIGURASI ====================
        const SUPABASE_URL = "https://oufcvucxxnfgimryjpbs.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91ZmN2dWN4eG5mZ2ltcnlqcGJzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTg1NDMsImV4cCI6MjA5MDU5NDU0M30.Gmp3NiQlXTiTzdZFh9XGjjNh39i7TGNozQfSYu9nE38";
        const ADMIN_PASSWORD = "admin2026";

        const SHIFT_CONFIG = {
            pagi: { start: "08:00", end: "14:00", nama: "Pagi (08:00-14:00)", jamMulai: 8 * 60 },
            siang: { start: "12:00", end: "18:00", nama: "Siang (12:00-18:00)", jamMulai: 12 * 60 },
            piket: { start: "08:00", end: "16:00", nama: "Piket (08:00-16:00)", jamMulai: 8 * 60 }
        };

        // ==================== FUNGSI LOGOUT ====================
        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }

        function checkAuth() {
            const isLoggedIn = sessionStorage.getItem("isLoggedIn");
            if (!isLoggedIn) {
                window.location.href = "index.html";
                return false;
            }
            return true;
        }
        window.logout = logout;

        // Lokasi Solo Balapan
        const SOLO_BALAPAN = { lat: -7.5592, lng: 110.822, radius: 500 };

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let faceModelsLoaded = false;
        let videoStream = null;
        let photoStream = null;
        let faceDetectionInterval = null;
        let isVerifying = false;
        let currentMatchedStudent = null;
        let currentSelectedShift = null;
        let capturedPhoto = null;
        const FACE_MATCH_THRESHOLD = 0.4;

        // ==================== WIB TIME ====================
        function getWIBTime() {
            return new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Jakarta" }));
        }

        function getTodayWIB() {
            const wib = getWIBTime();
            return `${wib.getFullYear()}-${String(wib.getMonth() + 1).padStart(2,'0')}-${String(wib.getDate()).padStart(2,'0')}`;
        }

        function formatWIBTime(dateStr) {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            const wibDate = new Date(date.getTime() + 7 * 60 * 60 * 1000);
            return `${String(wibDate.getUTCHours()).padStart(2,'0')}:${String(wibDate.getUTCMinutes()).padStart(2,'0')}:${String(wibDate.getUTCSeconds()).padStart(2,'0')}`;
        }

        // ==================== FACE RECOGNITION ====================
        async function loadFaceModels() {
            if (faceModelsLoaded) return true;
            const MODEL_URL = "https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights";
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                faceModelsLoaded = true;
                return true;
            } catch (error) {
                console.error(error);
                return false;
            }
        }

        async function startCamera(videoElement) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                videoElement.srcObject = stream;
                return stream;
            } catch (error) {
                return null;
            }
        }

        function stopCamera(stream, videoElement) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (videoElement) videoElement.srcObject = null;
        }

        function capturePhotoFromVideo(videoElement) {
            const canvas = document.createElement('canvas');
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        async function getFaceDescriptor(videoElement) {
            const detection = await faceapi.detectSingleFace(videoElement, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            return detection ? detection.descriptor : null;
        }

        async function matchFace(descriptor) {
            const { data: siswa, error } = await supabaseClient
                .from('siswa')
                .select('id, nis, nama, face_descriptor, sekolah:sekolah_id(nama)')
                .eq('has_face', true)
                .eq('status', 'aktif');
            if (error || !siswa || siswa.length === 0) return null;
            
            let bestMatch = null;
            let minDistance = FACE_MATCH_THRESHOLD;
            for (const s of siswa) {
                if (!s.face_descriptor) continue;
                const dbDescriptor = new Float32Array(Object.values(s.face_descriptor));
                const distance = faceapi.euclideanDistance(descriptor, dbDescriptor);
                if (distance < minDistance) {
                    minDistance = distance;
                    bestMatch = s;
                }
            }
            return bestMatch;
        }

        // ==================== CEK LOKASI ====================
        async function checkLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject("Geolocation tidak didukung");
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const distance = haversineDistance(position.coords.latitude, position.coords.longitude, SOLO_BALAPAN.lat, SOLO_BALAPAN.lng);
                        resolve({ allowed: distance <= SOLO_BALAPAN.radius, distance: distance });
                    },
                    (error) => {
                        let message = "Gagal dapat lokasi";
                        if (error.code === 1) message = "Izin lokasi ditolak";
                        else if (error.code === 2) message = "Lokasi tidak tersedia";
                        else if (error.code === 3) message = "Timeout mendapatkan lokasi";
                        reject(message);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        // ==================== STEP 1: DETEKSI WAJAH ====================
        async function startFaceDetection(video, cameraWrapper, faceStatus) {
            if (faceDetectionInterval) clearInterval(faceDetectionInterval);
            faceDetectionInterval = setInterval(async () => {
                if (!video.videoWidth || !video.videoHeight) return;
                const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions());
                if (detection) {
                    cameraWrapper.classList.remove("face-not-detected");
                    cameraWrapper.classList.add("face-detected");
                    faceStatus.innerHTML = "✅ Wajah terdeteksi! Memverifikasi...";
                    if (!isVerifying) {
                        isVerifying = true;
                        await verifyFace(video, faceStatus);
                    }
                } else {
                    cameraWrapper.classList.remove("face-detected");
                    cameraWrapper.classList.add("face-not-detected");
                    faceStatus.innerHTML = "❌ Wajah tidak terdeteksi";
                    isVerifying = false;
                }
            }, 500);
        }

        async function verifyFace(video, faceStatus) {
            let descriptors = [];
            for (let i = 0; i < 3; i++) {
                await new Promise(r => setTimeout(r, 200));
                const desc = await getFaceDescriptor(video);
                if (desc) descriptors.push(desc);
            }
            if (descriptors.length === 0) {
                faceStatus.innerHTML = "❌ Wajah tidak terdeteksi, coba lagi";
                isVerifying = false;
                return;
            }
            
            const avgDescriptor = new Float32Array(descriptors[0].length);
            for (const desc of descriptors) {
                for (let i = 0; i < desc.length; i++) avgDescriptor[i] += desc[i];
            }
            for (let i = 0; i < avgDescriptor.length; i++) avgDescriptor[i] /= descriptors.length;
            
            faceStatus.innerHTML = "🔍 Mencocokkan wajah dengan database...";
            const matchedUser = await matchFace(avgDescriptor);
            
            if (matchedUser) {
                const today = getTodayWIB();
                const { data: existingAbsen } = await supabaseClient
                    .from('absensi')
                    .select('id')
                    .eq('siswa_id', matchedUser.id)
                    .gte('tanggal', today)
                    .lte('tanggal', today + ' 23:59:59');
                
                if (existingAbsen && existingAbsen.length > 0) {
                    faceStatus.className = "face-status warning";
                    faceStatus.innerHTML = `⚠️ ${matchedUser.nama} sudah melakukan absen hari ini!`;
                    isVerifying = false;
                    setTimeout(() => resetAbsenPage(), 2000);
                    return;
                }
                
                currentMatchedStudent = matchedUser;
                stopFaceDetection();
                stopCamera(videoStream, video);
                
                // Pindah ke STEP 2: Ambil Foto
                showPhotoStep();
                
                isVerifying = false;
            } else {
                faceStatus.className = "face-status error";
                faceStatus.innerHTML = "❌ Wajah tidak dikenali. Silakan coba lagi.";
                isVerifying = false;
            }
        }

        function stopFaceDetection() {
            if (faceDetectionInterval) {
                clearInterval(faceDetectionInterval);
                faceDetectionInterval = null;
            }
            isVerifying = false;
        }

        // ==================== STEP 2: AMBIL FOTO ====================
        async function showPhotoStep() {
            document.getElementById("stepDetection").style.display = "none";
            document.getElementById("stepPhoto").style.display = "block";
            document.getElementById("faceStatus").innerHTML = "📸 Ambil foto selfie Anda";
            
            const video = document.getElementById("photoVideo");
            photoStream = await startCamera(video);
            
            document.getElementById("matchedStudentInfo").innerHTML = `
                <h4>👤 ${currentMatchedStudent.nama}</h4>
                <p>NIS: ${currentMatchedStudent.nis}</p>
                <p>Sekolah: ${currentMatchedStudent.sekolah?.nama || "-"}</p>
            `;
            document.getElementById("matchedStudentInfo").style.display = "block";
        }

        function takePhoto() {
            const video = document.getElementById("photoVideo");
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            capturedPhoto = canvas.toDataURL('image/jpeg', 0.8);
            
            document.getElementById("previewImg").src = capturedPhoto;
            document.getElementById("photoPreview").style.display = "block";
            document.getElementById("takePhotoBtn").style.display = "none";
            document.getElementById("shiftSection").style.display = "block";
        }

        function retakePhoto() {
            capturedPhoto = null;
            document.getElementById("photoPreview").style.display = "none";
            document.getElementById("takePhotoBtn").style.display = "block";
            document.getElementById("shiftSection").style.display = "none";
        }

        function resetAbsenPage() {
            if (faceDetectionInterval) clearInterval(faceDetectionInterval);
            if (videoStream) stopCamera(videoStream, document.getElementById("faceVideo"));
            if (photoStream) stopCamera(photoStream, document.getElementById("photoVideo"));
            
            currentMatchedStudent = null;
            currentSelectedShift = null;
            capturedPhoto = null;
            isVerifying = false;
            
            document.getElementById("stepDetection").style.display = "block";
            document.getElementById("stepPhoto").style.display = "none";
            document.getElementById("matchedStudentInfo").style.display = "none";
            document.getElementById("shiftSection").style.display = "none";
            document.getElementById("confirmAbsenBtn").style.display = "none";
            document.getElementById("photoPreview").style.display = "none";
            document.getElementById("takePhotoBtn").style.display = "block";
            document.getElementById("matchedStudentInfo").innerHTML = "";
            
            const faceStatus = document.getElementById("faceStatus");
            faceStatus.className = "face-status info";
            faceStatus.innerHTML = "😀 Hadapkan wajah ke kamera";
            
            const cameraWrapper = document.getElementById("faceCameraWrapper");
            cameraWrapper.classList.remove("face-detected", "face-not-detected");
        }

        // ==================== LOAD ABSEN LIST ====================
        async function loadAbsenList() {
            const container = document.getElementById("absenList");
            const today = getTodayWIB();
            const { data: absensi, error } = await supabaseClient
                .from('absensi')
                .select('*, siswa:siswa_id(nama, nis)')
                .gte('tanggal', today)
                .lte('tanggal', today + ' 23:59:59')
                .order('tanggal', { ascending: false });
            
            if (error || !absensi || absensi.length === 0) {
                container.innerHTML = '<div class="empty-list">✨ Belum ada yang absen hari ini</div>';
                return;
            }
            container.innerHTML = absensi.map(a => `
                <div class="absen-item">
                    <div class="absen-item-info">
                        <h4>${a.siswa?.nama || "Unknown"}</h4>
                        <p>NIS: ${a.siswa?.nis || "-"}</p>
                    </div>
                    <div class="absen-item-time">${formatWIBTime(a.tanggal)}</div>
                </div>
            `).join('');
        }

        // ==================== LOAD RUNNING TEXT ====================
        async function loadRunningText() {
            try {
                const { data, error } = await supabaseClient
                    .from('running_text')
                    .select('text')
                    .eq('is_active', true)
                    .order('created_at', { ascending: false })
                    .limit(1);
                const container = document.getElementById("runningTextContainer");
                const textElement = document.getElementById("runningText");
                if (error || !data || data.length === 0) {
                    if (container) container.style.display = "none";
                    return;
                }
                if (textElement) textElement.textContent = data[0].text;
                if (container) container.style.display = "block";
            } catch (error) {
                console.error("Error loading running text:", error);
            }
        }

        // ==================== DO ABSEN ====================
        async function doAbsen() {
            if (!currentMatchedStudent || !currentSelectedShift) {
                alert("Pilih shift terlebih dahulu!");
                return;
            }
            if (!capturedPhoto) {
                alert("Ambil foto selfie terlebih dahulu!");
                return;
            }
            
            const confirmBtn = document.getElementById("confirmAbsenBtn");
            confirmBtn.disabled = true;
            confirmBtn.textContent = "Memproses...";
            
            try {
                const locationCheck = await checkLocation();
                if (!locationCheck.allowed) {
                    alert(`❌ Absen gagal! Anda tidak berada di area Solo Balapan. Jarak Anda ${Math.round(locationCheck.distance)} meter.`);
                    confirmBtn.disabled = false;
                    confirmBtn.textContent = "✅ Konfirmasi Absen";
                    return;
                }
            } catch (err) {
                alert(`❌ Gagal cek lokasi: ${err}`);
                confirmBtn.disabled = false;
                confirmBtn.textContent = "✅ Konfirmasi Absen";
                return;
            }
            
            const now = getWIBTime();
            const jamMulai = SHIFT_CONFIG[currentSelectedShift].jamMulai;
            const jamAbsenValue = now.getHours() * 60 + now.getMinutes();
            const isTerlambat = jamAbsenValue > jamMulai + 15;
            const keterlambatan = isTerlambat ? `Terlambat ${jamAbsenValue - jamMulai} menit` : "Tepat waktu";
            const status = isTerlambat ? "terlambat" : "hadir";
            
            const wibISOString = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}T${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}+07:00`;
            
            let ip = "Tidak terdeteksi";
            try {
                const ipRes = await fetch("https://api.ipify.org?format=json");
                const ipData = await ipRes.json();
                ip = ipData.ip;
            } catch (err) {}
            
            const absenData = {
                siswa_id: currentMatchedStudent.id,
                shift: currentSelectedShift,
                tanggal: wibISOString,
                status: status,
                keterlambatan: keterlambatan,
                foto: capturedPhoto,
                lokasi: `Solo Balapan (${SOLO_BALAPAN.lat}, ${SOLO_BALAPAN.lng})`,
                ip_address: ip
            };
            
            const { error } = await supabaseClient.from('absensi').insert([absenData]);
            
            if (error) {
                alert("Error: " + error.message);
                confirmBtn.disabled = false;
                confirmBtn.textContent = "✅ Konfirmasi Absen";
            } else {
                alert(`✅ Absen berhasil! ${status === "hadir" ? "Selamat datang!" : keterlambatan}`);
                resetAbsenPage();
                loadAbsenList();
                switchPage('list');
            }
        }

        // ==================== PAGE NAVIGATION ====================
        function switchPage(page) {
            document.getElementById("absenPage").classList.remove("active");
            document.getElementById("adminPage").classList.remove("active");
            document.getElementById("listPage").classList.remove("active");
            document.getElementById(`${page}Page`).classList.add("active");
            
            document.querySelectorAll(".nav-item").forEach(item => item.classList.remove("active"));
            if (page === 'absen') {
                document.getElementById("navAbsenBtn").classList.add("active");
                initAbsenPage();
            } else if (page === 'admin') {
                document.getElementById("navAdminBtn").classList.add("active");
            } else if (page === 'list') {
                document.getElementById("navListBtn").classList.add("active");
                loadAbsenList();
            }
        }

        async function initAbsenPage() {
            resetAbsenPage();
            
            const video = document.getElementById("faceVideo");
            const cameraWrapper = document.getElementById("faceCameraWrapper");
            const faceStatus = document.getElementById("faceStatus");
            
            faceStatus.innerHTML = "🔄 Memuat model...";
            const modelsLoaded = await loadFaceModels();
            if (!modelsLoaded) {
                faceStatus.innerHTML = "❌ Gagal load model";
                return;
            }
            
            faceStatus.innerHTML = "📷 Mengaktifkan kamera...";
            videoStream = await startCamera(video);
            if (!videoStream) {
                faceStatus.innerHTML = "❌ Gagal akses kamera";
                return;
            }
            
            faceStatus.innerHTML = "😀 Hadapkan wajah ke kamera";
            startFaceDetection(video, cameraWrapper, faceStatus);
        }

        // ==================== EVENT LISTENERS ====================
        document.addEventListener("DOMContentLoaded", async () => {
            if (!checkAuth()) return;
            
            await loadRunningText();
            await loadAbsenList();
            
            // Bottom navigation
            document.getElementById("navAbsenBtn").onclick = () => switchPage('absen');
            document.getElementById("navAdminBtn").onclick = () => switchPage('admin');
            document.getElementById("navListBtn").onclick = () => switchPage('list');
            
            // Admin login
            document.getElementById("adminPasswordLoginBtn").onclick = () => {
                const password = document.getElementById("adminPasswordInput").value;
                if (password !== ADMIN_PASSWORD) {
                    alert("Password admin salah!");
                    return;
                }
                sessionStorage.setItem("isLoggedIn", "true");
                sessionStorage.setItem("userRole", "admin");
                window.location.href = "admin.html";
            };
            
            // Photo buttons
            document.getElementById("takePhotoBtn").onclick = takePhoto;
            document.getElementById("retakePhotoBtn").onclick = retakePhoto;
            
            // Shift options
            document.querySelectorAll(".shift-option").forEach(btn => {
                btn.onclick = () => {
                    currentSelectedShift = btn.getAttribute("data-shift");
                    document.getElementById("confirmAbsenBtn").style.display = "block";
                    document.querySelectorAll(".shift-option").forEach(b => b.style.border = "1px solid #E2E8F0");
                    btn.style.border = "2px solid #2E7D32";
                };
            });
            
            document.getElementById("confirmAbsenBtn").onclick = doAbsen;
            
            switchPage('absen');
        });

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/service-worker.js").then(registration => {
                    console.log("Service Worker registered successfully:", registration);
                }).catch(error => {
                    console.log("Service Worker registration failed:", error);
                });
            });
        }
    </script>
</body>
</html>
